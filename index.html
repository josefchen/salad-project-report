<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>The Salad Project — Analytics Report</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            .staticrypt-html { height: 100%; }
            .staticrypt-body { height: 100%; margin: 0; }

            .staticrypt-content {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1e433b;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .tsp-card {
                background: #162e28;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.2);
                padding: 48px 40px 36px;
                width: 100%;
                max-width: 400px;
                margin: 20px;
                text-align: center;
            }

            .tsp-logo {
                margin-bottom: 16px;
            }

            .tsp-brand-name {
                font-size: 13px;
                font-variant: small-caps;
                letter-spacing: 3px;
                color: #ddefaf;
                margin-bottom: 24px;
            }

            .tsp-separator {
                border: none;
                border-top: 1px solid #2d5c4e;
                margin: 0 0 24px;
            }

            .tsp-title {
                font-size: 20px;
                font-weight: 600;
                color: #ddefaf;
                margin-bottom: 6px;
            }

            .tsp-subtitle {
                font-size: 14px;
                color: #8ab87a;
                margin-bottom: 28px;
            }

            .staticrypt-password-container {
                position: relative;
                width: 100%;
                margin-bottom: 16px;
            }

            .staticrypt-password-container input[type="password"],
            .staticrypt-password-container input[type="text"] {
                width: 100%;
                padding: 14px 46px 14px 16px;
                background: #122820;
                border: 1.5px solid #2d5c4e;
                border-radius: 10px;
                color: #ddefaf;
                font-size: 15px;
                font-family: inherit;
                outline: none;
                transition: border-color 0.2s;
            }

            .staticrypt-password-container input:focus {
                border-color: #b6d994;
            }

            .staticrypt-password-container input::placeholder {
                color: #5a8a6a;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.5;
                padding: 0;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(90%) sepia(20%) saturate(300%) hue-rotate(50deg);
                transition: opacity 0.2s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.8;
            }

            .staticrypt-decrypt-button {
                width: 100%;
                padding: 14px;
                background: #b6d994;
                color: #122820;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                transition: background 0.2s, transform 0.1s;
                letter-spacing: 0.5px;
            }

            .staticrypt-decrypt-button:hover {
                background: #c8e8a8;
            }

            .staticrypt-decrypt-button:active {
                transform: scale(0.98);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 16px;
                color: #8ab87a;
                font-size: 13px;
                gap: 8px;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                accent-color: #b6d994;
            }

            .tsp-footer {
                margin-top: 28px;
                font-size: 11px;
                color: #5a8a6a;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1e433b;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid #2d5c4e;
                border-right-color: #b6d994;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media (max-width: 440px) {
                .tsp-card {
                    padding: 36px 24px 28px;
                    margin: 16px;
                }
            }
        </style>
    </head>
